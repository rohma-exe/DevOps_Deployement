version: '3.8'

services:
  backend:
    container_name: backend-ci
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8889:8888"

  frontend:
    container_name: frontend-ci
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3001:3000"
